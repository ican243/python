<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <script>
      var person1 = {
        toLocaleString: function () {
          return "Nikoals";
        },
        toString: function () {
          return "Nicholas";
        },
      };

      var person2 = {
        toLocaleString: function () {
          return "Grigorios";
        },
      };

      var people = [person1, person2];
      alert(people);
      alert(people.toString());
      alert(people.toLocaleString());
    </script>
  </body>
</html>
